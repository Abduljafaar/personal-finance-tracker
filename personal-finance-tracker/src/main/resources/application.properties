# =========================
# Server Configuration
# =========================
server.port=${PORT:8080}

# =========================
# Database Configuration
# =========================
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/finance_db?useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# Hikari Connection Pool
# =========================
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# =========================
# JPA Configuration
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT Configuration
# =========================
jwt.secret=${JWT_SECRET:mySuperSecureSecretKeyForJWTWithAtLeast512Bits1234567890abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890}
jwt.expiration=86400000

# =========================
# Logging
# =========================
logging.level.com.finance=${LOG_LEVEL:DEBUG}